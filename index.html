const ROOT_GROUPS = [
  ["postchorus", ["post-chorus", "post chorus", "pos-refrao", "pós-refrão", "pos refrao", "pós refrão"]],
  ["prechorus", ["pre-chorus", "pre chorus", "prechorus", "pre-refrao", "pré-refrão", "pre refrao", "pré refrão"]],
  ["chorus", ["chorus", "refrao", "refrão", "refrain"]],
  ["verse", ["verse", "verso"]],
  ["bridge", ["bridge", "ponte"]],
  ["neutral", ["intro", "introducao", "introdução", "instrumental", "interlude", "interludio", "interlúdio", "tag", "vamp", "outro", "ending", "turnaround", "final", "saida", "saída", "coda"]],
];

function detectLabel(rawLine) {
  const clean = rawLine.replace(/[\[\]]/g, "").trim();
  if (!clean || clean.length > 24) return null;
  const probe = clean.replace(/\(.*?\)/g, "").replace(/:$/, "").trim().toLowerCase();
  for (const [cat, roots] of ROOT_GROUPS) {
    for (const root of roots) {
      const re = new RegExp("^" + root.replace(/[-/\\^$*+?.()|[\]{}]/g, "\\$&") + "(\\s+\\d+)?$", "i");
      if (re.test(probe)) return { cat, text: clean };
    }
  }
  return null;
}

function parseSections(text) {
  const lines = text.split("\n");
  const blocks = []; let cur = null;
  for (const line of lines) {
    const label = detectLabel(line);
    if (label) { cur = { label: label.text, cat: label.cat, lines: [] }; blocks.push(cur); }
    else if (cur) { cur.lines.push({ t: line.trim() ? "lyric" : "blank", s: line }); }
    else if (line.trim()) { cur = { label: null, cat: "neutral", lines: [{ t: "lyric", s: line }] }; blocks.push(cur); }
  }
  return blocks;
}

const CHORD_RE = /^[A-G][#b]?(maj|min|m|sus|dim|aug|add|M)?\d{0,2}(\([^)]*\))?(\/[A-G][#b]?)?$/;
function isChordToken(t) { return CHORD_RE.test(t); }
function isChordLine(line) {
  const toks = line.trim().split(/\s+/).filter(Boolean);
  if (!toks.length) return false;
  let ch = 0;
  for (const t of toks) if (isChordToken(t)) ch++;
  return ch >= 1 && ch / toks.length >= 0.6;
}

function parseChordChart(text) {
  const lines = text.split("\n");
  const blocks = []; let cur = null;
  const push = (t, s) => { if (!cur) { cur = { label: null, cat: "neutral", lines: [] }; blocks.push(cur); } cur.lines.push({ t, s }); };
  for (const line of lines) {
    const label = detectLabel(line);
    if (label) { cur = { label: label.text, cat: label.cat, lines: [] }; blocks.push(cur); continue; }
    if (!line.trim()) { push("blank", ""); continue; }
    push(isChordLine(line) ? "chord" : "lyric", line);
  }
  return blocks;
}

async function parseApiResponse(res) {
  const raw = await res.text();
  if (!raw || !raw.trim()) throw new Error("resposta vazia (HTTP " + res.status + ")");
  try { return JSON.parse(raw); } catch (_) { /* not plain JSON, try stream */ }
  if (raw.indexOf("data:") !== -1) {
    let text = "", errMsg = null;
    for (const line of raw.split(/\r?\n/)) {
      const t = line.trim();
      if (!t.startsWith("data:")) continue;
      const payload = t.slice(5).trim();
      if (!payload || payload === "[DONE]") continue;
      let ev; try { ev = JSON.parse(payload); } catch (_) { continue; }
      if (ev.type === "error" && ev.error) errMsg = ev.error.message || ev.error.type || "erro da API";
      else if (ev.type === "content_block_delta" && ev.delta && ev.delta.type === "text_delta") text += ev.delta.text;
      else if (ev.type === "content_block_start" && ev.content_block && ev.content_block.type === "text") text += (ev.content_block.text || "");
    }
    if (errMsg) throw new Error(errMsg);
    if (text) return { content: [{ type: "text", text }] };
    throw new Error("stream sem texto (HTTP " + res.status + ")");
  }
  throw new Error("formato inesperado: " + raw.slice(0, 100).replace(/\s+/g, " "));
}

async function pdfInflate(bytes) {
  const run = async (fmt) => {
    const ds = new DecompressionStream(fmt);
    const w = ds.writable.getWriter();
    w.write(bytes); w.close();
    const ab = await new Response(ds.readable).arrayBuffer();
    return new Uint8Array(ab);
  };
  try { return await run("deflate"); } catch (_) { try { return await run("deflate-raw"); } catch (_2) { return null; } }
}

const bytesToLatin1 = (u) => { let out = ""; const CH = 0x8000; for (let i = 0; i < u.length; i += CH) out += String.fromCharCode.apply(null, u.subarray(i, i + CH)); return out; };

async function extractCifra(bytes) {
  if (typeof DecompressionStream === "undefined") throw new Error("navegador sem suporte a descompactação de PDF");
  const S = bytesToLatin1(bytes);
  const toBytes = (str) => { const u = new Uint8Array(str.length); for (let i = 0; i < str.length; i++) u[i] = str.charCodeAt(i) & 255; return u; };
  const objs = {}; const order = [];
  const objRe = /(\d+) 0 obj([\s\S]*?)endobj/g; let m;
  while ((m = objRe.exec(S))) { objs[+m[1]] = m[2]; order.push([+m[1], m.index]); }
  const getStream = async (body) => {
    const sm = /stream\r?\n/.exec(body); if (!sm) return null;
    const start = sm.index + sm[0].length; const end = body.indexOf("endstream", start);
    const raw = body.slice(start, end).replace(/\r?\n$/, "");
    if (body.slice(0, sm.index).indexOf("/FlateDecode") !== -1) {
      const inf = await pdfInflate(toBytes(raw)); if (!inf) return null;
      return bytesToLatin1(inf);
    }
    return raw;
  };
  const parseTU = (t) => {
    const mp = {};
    for (const blk of t.match(/beginbfchar[\s\S]*?endbfchar/g) || []) {
      const re = /<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>/g; let mm;
      while ((mm = re.exec(blk))) { let s = ""; for (let i = 0; i < mm[2].length; i += 4) s += String.fromCharCode(parseInt(mm[2].slice(i, i + 4), 16)); mp[parseInt(mm[1], 16)] = s; }
    }
    for (const blk of t.match(/beginbfrange[\s\S]*?endbfrange/g) || []) {
      const re = /<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>/g; let mm;
      while ((mm = re.exec(blk))) { const lo = parseInt(mm[1], 16), hi = parseInt(mm[2], 16), base = parseInt(mm[3], 16); for (let k = lo; k <= hi && k - lo < 5000; k++) mp[k] = String.fromCharCode(base + (k - lo)); }
    }
    return mp;
  };
  const tuByFont = {};
  for (const num in objs) {
    const body = objs[num];
    const mt = /\/ToUnicode\s+(\d+)\s+0\s+R/.exec(body);
    if (mt && body.indexOf("/Font") !== -1) { const st = await getStream(objs[+mt[1]] || ""); if (st) tuByFont[num] = parseTU(st); }
  }
  const nameToFont = {};
  { const re = /\/(F\d+)\s+(\d+)\s+0\s+R/g; let mm; while ((mm = re.exec(S))) nameToFont[mm[1]] = +mm[2]; }
  const cmapFor = (n) => tuByFont[nameToFont[n]] || {};
  order.sort((a, b) => a[1] - b[1]);
  const lines = [];
  for (const pair of order) {
    const st = await getStream(objs[pair[0]]); if (!st || st.indexOf("BT") === -1) continue;
    let cur = null, size = 12, x = 0, y = 0; const rows = [];
    const re = /\/(F\d+)\s+([\d.]+)\s+Tf|(-?[\d.]+) 0 0 (-?[\d.]+) (-?[\d.]+) (-?[\d.]+) Tm|(-?[\d.]+)\s+(-?[\d.]+)\s+Td|\[([\s\S]*?)\]\s*TJ|<([0-9A-Fa-f]+)>\s*Tj/g;
    let mm;
    while ((mm = re.exec(st))) {
      if (mm[1]) { cur = mm[1]; size = parseFloat(mm[2]); }
      else if (mm[5] !== undefined) { x = parseFloat(mm[5]); y = parseFloat(mm[6]); }
      else if (mm[7] !== undefined) { x += parseFloat(mm[7]); y += parseFloat(mm[8]); }
      else {
        const cm = cur ? cmapFor(cur) : {}; let hexes = [];
        if (mm[9] !== undefined) { hexes = (mm[9].match(/<([0-9A-Fa-f]+)>/g) || []).map((h) => h.slice(1, -1)); }
        else if (mm[10] !== undefined) hexes = [mm[10]];
        let s = ""; for (const h of hexes) for (let i = 0; i < h.length; i += 4) { const c = cm[parseInt(h.slice(i, i + 4), 16)]; s += c === undefined ? "" : c; }
        if (s !== "") rows.push([Math.round(y * 10) / 10, x, s, size]);
      }
    }
    const byY = {};
    for (const r of rows) { (byY[r[0]] = byY[r[0]] || []).push([r[1], r[2], r[3]]); }
    for (const yy of Object.keys(byY).map(Number).sort((a, b) => a - b)) {
      const segs = byY[yy].sort((a, b) => a[0] - b[0]);
      let line = "", penEnd = 0;
      for (const seg of segs) {
        const xx = seg[0], s = seg[1], sz = seg[2], cw = sz * 0.5;
        if (line === "") { const lead = Math.round(xx / cw); line = " ".repeat(Math.max(0, lead)); }
        else { const gap = xx - penEnd; if (gap > cw * 1.25) line += " ".repeat(Math.max(1, Math.round(gap / cw))); }
        line += s; penEnd = xx + s.length * cw;
      }
      lines.push(line.replace(/\s+$/, ""));
    }
  }
  const lead = (s) => s.length - s.replace(/^ +/, "").length;
  const ne = lines.filter((l) => l.trim());
  const base = ne.length ? Math.min.apply(null, ne.map(lead)) : 0;
  return lines.map((l) => (l.trim() ? l.slice(base) : ""));
}

function postProcessCifra(lines) {
  let L = lines.filter((l) => !/utilize as cifras|acompanhamento por cifras|tocar sem o/i.test(l));
  while (L.length && !L[0].trim()) L.shift();
  let title = "", key = "";
  for (let i = 0; i < Math.min(3, L.length); i++) {
    const mm = /^(.+?)\s*[-\u2013]\s*([A-G][#b]?m?)\s*$/.exec(L[i].trim());
    if (mm) { title = mm[1].replace(/\s{2,}/g, " ").trim(); key = mm[2]; L.splice(i, 1); break; }
  }
  while (L.length && !L[0].trim()) L.shift();
  while (L.length && !L[L.length - 1].trim()) L.pop();
  return { title: title, key: key, chart: L.join("\n") };
}

function splitChunks(text) {
  const lines = text.split("\n");
  const preamble = []; const chunks = []; let cur = null;
  for (const line of lines) {
    const label = detectLabel(line);
    if (label) { cur = { label: label.text, cat: label.cat, lines: [line] }; chunks.push(cur); }
    else if (cur) cur.lines.push(line);
    else preamble.push(line);
  }
  return { preamble, chunks };
}

function serializeChunks(preamble, chunks) {
  const norm = (arr) => { const a = arr.slice(); while (a.length && !a[0].trim()) a.shift(); while (a.length && !a[a.length - 1].trim()) a.pop(); return a.join("\n"); };
  const parts = [];
  const pre = norm(preamble);
  if (pre.trim()) parts.push(pre);
  for (const c of chunks) { const s = norm(c.lines); if (s !== "") parts.push(s); }
  return parts.join("\n\n");
}

function autoLabelLyrics(text, lang) {
  if (splitChunks(text).chunks.length) return text.replace(/^\n+|\n+$/g, "");
  const V = lang === "pt" ? "Verso" : "Verse";
  const CH = lang === "pt" ? "Refrão" : "Chorus";
  const stanzas = text.split(/\n\s*\n/).map((s) => s.replace(/^\s+|\s+$/g, "")).filter(Boolean);
  if (stanzas.length <= 1) return text.replace(/^\n+|\n+$/g, "");
  const norm = (s) => s.toLowerCase().replace(/\s+/g, " ").trim();
  const counts = {};
  for (const s of stanzas) counts[norm(s)] = (counts[norm(s)] || 0) + 1;
  let vn = 0; const out = [];
  for (const s of stanzas) {
    if (counts[norm(s)] > 1) out.push(CH, s, "");
    else { vn++; out.push(V + " " + vn, s, ""); }
  }
  return out.join("\n").replace(/\n+$/, "");
}

function deriveStructure(text, mode) {
  const blocks = mode === "cifras" ? parseChordChart(text) : parseSections(text);
  return blocks.filter((b) => b.label).map((b) => ({ label: b.label, cat: b.cat }));
}

  async function organize(mode) {
    const input = mode === "cifras" ? cChart : lyrics;
    if (!input.trim()) { setError(mode === "cifras" ? "Cole a cifra primeiro." : "Cole a letra primeiro."); return; }
    setLoading(true); setError(""); setCopied(false);
    if (mode === "cifras") setCResult(""); else setResult("");
    const trimBlank = (t) => { const L = t.split("\n"); while (L.length && !L[0].trim()) L.shift(); while (L.length && !L[L.length - 1].trim()) L.pop(); return L.join("\n"); };
    let out = "";
    try {
      const body = {
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: mode === "cifras" ? buildPromptChords() : buildPromptLyrics() }],
      };
      if (useWeb) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
      });
      const data = await parseApiResponse(res);
      const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
      let o = text;
      const m = text.match(/<<<INICIO>>>([\s\S]*?)<<<FIM>>>/);
      if (m) o = m[1];
      o = trimBlank(o.replace(/<<<INICIO>>>|<<<FIM>>>/g, ""));
      if (o.trim()) out = o;
    } catch (e) { /* IA indisponível — usa o modo offline abaixo */ }
    if (!out.trim()) {
      out = mode === "cifras" ? trimBlank(input) : autoLabelLyrics(input, lang);
    }
    const struct = deriveStructure(out, mode);
    if (mode === "cifras") { setCResult(out); setStructC(struct); } else { setResult(out); setStructL(struct); }
    setLoading(false);
  }

  async function importPdf(file) {

        const r = new FileReader();
        r.onload = () => res(new Uint8Array(r.result));
        r.onerror = () => rej(new Error("falha ao ler o arquivo"));
        r.readAsArrayBuffer(file);

      const lines = await extractCifra(buf);
      const got = lines.filter((l) => l.trim()).length;
      if (got < 2) throw new Error("não encontrei texto neste PDF (pode ser um PDF de imagem/escaneado)");
      const r = postProcessCifra(lines);
      if (r.title) setCTitle(r.title);
      if (r.key) setCKey(r.key);
      setCChart(r.chart || lines.join("\n"));
    } catch (e) {
      setError("Não consegui ler esse PDF (motivo: " + (e && e.message ? e.message : "erro") + "). Como alternativa, abra o PDF, copie o texto e cole no campo abaixo.");
    } finally {
      setImporting(false); setImportMsg("");
      if (fileRef.current) fileRef.current.value = "";

  }

  function savePDF(mode) {

      const twoCol = isC ? (columns === "2") : (columns === "2" || (columns === "auto" && (result.split("\n").filter((l) => l.trim()).length > 30)));

      const PW = 595.28, PH = 841.89, M = 42.52, GAP = 40;
      const contentW = PW - 2 * M;
      const colW = twoCol ? (contentW - GAP) / 2 : contentW;
      const colX = twoCol ? [M, M + colW + GAP] : [M];
      const INK = [0.102, 0.094, 0.082], MUT = [0.420, 0.396, 0.357], LINE = [0.843, 0.824, 0.784], CHC = [0.761, 0.384, 0.180];
      const hx = (h) => { const n = parseInt(h.slice(1), 16); return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255]; };
      const CATC = {}; for (const k in CAT_STYLE) CATC[k] = { fg: hx(CAT_STYLE[k].fg), bg: hx(CAT_STYLE[k].bg) };
      const esc = (s) => s.replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
      const toWin = (s) => s.split("").map((ch) => (ch.charCodeAt(0) <= 255 ? ch : "?")).join("");
      const F = { H: "/F1", HB: "/F2", TR: "/F3", TI: "/F4", CO: "/F5", COB: "/F6" };
      const f2 = (n) => n.toFixed(2), f3 = (n) => n.toFixed(3);

          f2(x + w) + " " + f2(yb + h - r) + " l\n" +

        const words = txt.split(/\s+/).filter(Boolean); const lines = []; let c = "";
        for (const w of words) {
          const t = c ? c + " " + w : w;
          if (t.length <= mx) c = t;
          else { if (c) lines.push(c); if (w.length > mx) { let s = w; while (s.length > mx) { lines.push(s.slice(0, mx)); s = s.slice(mx); } c = s; } else c = w; }
        }
        if (c) lines.push(c);

      };

      const CH_H = 12.5;
      newPage();
      let tY = M;
      if (OBS) { for (const ol of wrapw(OBS, 9.5, contentW, false)) { text(M, tY + 7.6, 9.5, "TI", MUT, ol, 0); tY += 12; } tY += 6; }

      tY += 8;

      const seq = (isC ? structC : structL) || [];
      if (seq.length) {
        text(M, tY + 6.4, 8, "HB", MUT, "ESTRUTURA DA M\u00daSICA", 0.6); tY += 13;
        const chipH = 14; let cx = M, cy = tY;
        for (let i = 0; i < seq.length; i++) {
          const cc = CATC[seq[i].cat] || CATC.neutral;

      offsets[7] = out.length; out += "7 0 obj\n" + imgDict + "\nstream\n" + jbin + "\nendstream\nendobj\n";

                <input ref={fileRef} type="file" accept="application/pdf,.pdf" style={{ display: "none" }} onChange={(e) => importPdf(e.target.files && e.target.files[0])} />
                <button onClick={() => fileRef.current && fileRef.current.click()} disabled={importing} style={{ ...action(false), opacity: importing ? 0.7 : 1 }}>
                  {importing ? <Loader2 size={14} className="spin" /> : <FileUp size={14} />} {importing ? "Lendo PDF..." : "Importar PDF"}
                </button>
                <span style={{ fontSize: 12.5, color: C.muted }}>{importing ? (importMsg || "Lendo PDF...") : "Importe um PDF de cifra, ou cole/digite abaixo."}</span>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
                <input value={cTitle} onChange={(e) => setCTitle(e.target.value)} placeholder="Nome da música (opcional)" style={inputStyle("1 1 240px")} />
                <input value={cKey} onChange={(e) => setCKey(e.target.value)} placeholder="Tom (ex.: G)" style={inputStyle("1 1 110px")} />
              </div>
              <input value={cObs} onChange={(e) => setCObs(e.target.value)} placeholder="Cantor / versão (opcional)" style={{ ...inputStyle("1 1 100%"), width: "100%", boxSizing: "border-box", marginBottom: 12 }} />
              <textarea value={cChart} onChange={(e) => setCChart(e.target.value)} rows={11}
                placeholder={"Cole a cifra aqui (acordes acima da letra)...\n\n Em            C9\nO que faz o cordeiro que venceu\n   G               D9\nO Rei dos reis que assentando no trono está"}
                style={{ width: "100%", boxSizing: "border-box", padding: "13px 14px", borderRadius: 12, border: "1px solid " + C.line, background: C.bg, fontFamily: MONO, fontSize: 13, lineHeight: 1.55, color: C.ink, resize: "vertical", outline: "none", whiteSpace: "pre" }} />

              <div style={{ display: "flex", flexWrap: "wrap", gap: 22, alignItems: "center", margin: "16px 2px 4px" }}>
                <div>
                  <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: C.muted, marginBottom: 7, fontWeight: 600 }}>Rótulos</div>
                  <div style={{ display: "flex", gap: 7 }}><button onClick={() => setLang("en")} style={pill(lang === "en")}>Inglês</button><button onClick={() => setLang("pt")} style={pill(lang === "pt")}>Português</button></div>
                </div>
                <div>
                  <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: C.muted, marginBottom: 7, fontWeight: 600 }}>Consulta online</div>
                  <button onClick={() => setUseWeb(!useWeb)} style={{ ...pill(useWeb), display: "flex", alignItems: "center", gap: 7 }}><Globe size={14} /> {useWeb ? "Ligada" : "Desligada"}</button>
                </div>
              </div>

              <button onClick={() => organize("cifras")} disabled={loading} style={{ marginTop: 20, width: "100%", padding: "14px", borderRadius: 12, border: "none", background: C.ink, color: C.surface, fontFamily: DISPLAY, fontSize: 15, fontWeight: 700, cursor: loading ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 9, opacity: loading ? 0.7 : 1 }}>
                {loading ? <Loader2 size={17} className="spin" /> : <Guitar size={17} />}
                {loading ? "Montando cifra..." : "Montar cifra"}
              </button>
              {error && <p style={{ color: "#9A3B2E", fontSize: 13.5, margin: "12px 2px 0" }}>{error}</p>}
            </div>

            {cResult && <Result mode="cifras" result={cResult} title={cTitle} subtitle={cKey ? "Tom: " + cKey : ""} obs={cObs} columns={columns} setColumns={setColumns} twoCol={twoColCifras} onPdf={() => savePDF("cifras")} pdfBusy={pdfBusy} onCopy={() => copyOut(cResult)} copied={copied} structure={structC} setStructure={setStructC} />}
          </>
        )}

        <p style={{ color: C.muted, fontSize: 12.5, lineHeight: 1.55, margin: "18px 4px 0", textAlign: "center" }}>
          {tab === "cifras"
            ? "Importar PDF lê seu arquivo e preenche nome, tom e a cifra (editável). Os acordes que você colar são preservados como estão; o agente só marca as seções. O PDF sai com a marca d'água da PBC."
            : "A consulta online confirma só a ordem das seções — a letra usada é sempre a que você colou. O PDF sai colorido, com a marca d'água da PBC."}
        </p>
      </div>
      <style>{`.spin{animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
        textarea:focus,input:focus{border-color:${C.ink}!important}
        *{-webkit-tap-highlight-color:transparent}
        html{-webkit-text-size-adjust:100%}
        body{overflow-x:hidden}
        @media (max-width:820px){input,textarea{font-size:16px !important}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
